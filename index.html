<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KidsAPP</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e5570">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KidsAPP">
<link rel="apple-touch-icon" href="icon-180.png">

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --teal:      #0e5570;
  --teal-dim:  #0a3f54;
  --teal-light:#e4f2f8;
  --orange:    #c94010;
  --orange-lt: #fde8e2;
  --bg:        #f2f2f7;
  --card:      #ffffff;
  --text:      #1c1c1e;
  --sub:       #8e8e93;
  --border:    #e5e5ea;
  --green:     #34c759;
  --shadow:    0 1px 3px rgba(0,0,0,.08);
}

body{
  font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  max-width:430px;margin:0 auto;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Navbar ── */
.navbar{
  background:var(--teal);color:#fff;
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.22);
}
.navbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.nav-btn{
  width:32px;height:32px;border-radius:9px;border:none;
  background:rgba(255,255,255,.18);color:#fff;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.nav-btn:active{background:rgba(255,255,255,.32);}

/* ── Child tabs ── */
.tabs-bar{background:var(--teal-dim);padding:8px 12px;}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.ctab{
  flex-shrink:0;padding:5px 13px;border-radius:14px;
  font-size:12px;font-weight:600;
  border:1.5px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.ctab.active{background:#fff;color:var(--teal);border-color:#fff;}
.ctab-add{
  flex-shrink:0;padding:5px 10px;border-radius:14px;font-size:15px;
  border:1.5px dashed rgba(255,255,255,.3);background:transparent;
  color:rgba(255,255,255,.5);cursor:pointer;margin-left:auto;
}

/* ── Content ── */
.content{padding:12px 14px 50px;}

/* ── Auditor bar ── */
.aud-bar{
  background:var(--card);border-radius:11px;padding:8px 12px;
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
  border:1px solid var(--border);box-shadow:var(--shadow);
}
.aud-dot{width:7px;height:7px;border-radius:50%;background:var(--sub);flex-shrink:0;}
.aud-dot.on{background:var(--green);}
.aud-lbl{font-size:12px;color:var(--sub);}
.aud-nm{font-size:12px;font-weight:600;color:var(--teal);}
.aud-switch{
  margin-left:auto;font-size:11px;padding:3px 9px;
  background:var(--teal-light);color:var(--teal);
  border-radius:7px;border:none;cursor:pointer;font-weight:600;
}

/* ── Profile card ── */
.profile-card{
  background:var(--card);border-radius:16px;padding:14px;
  display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.profile-card::before{
  content:'';position:absolute;left:0;top:0;
  width:4px;height:100%;background:var(--teal);
}
.avatar{
  width:64px;height:64px;border-radius:13px;
  background:var(--teal-light);border:2px solid var(--teal);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:30px;
}
.p-right{flex:1;min-width:0;}
.p-name{font-size:16px;font-weight:700;margin-bottom:6px;}
.bal-ntd{
  font-size:30px;font-weight:800;color:var(--teal);
  line-height:1;letter-spacing:-.5px;
  display:flex;align-items:baseline;gap:4px;
}
.bal-mins{
  font-size:24px;font-weight:800;color:var(--orange);
  line-height:1.2;margin-top:3px;letter-spacing:-.3px;
  display:flex;align-items:baseline;gap:4px;
}
.b-unit{font-size:11px;font-weight:400;color:var(--sub);}

/* ── Section labels ── */
.sec-lbl{
  font-size:10px;font-weight:700;color:var(--sub);
  letter-spacing:.6px;text-transform:uppercase;
  padding:0 2px;margin-bottom:7px;
}

/* ── Category grid ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}

/* ── Category tile ── */
.cat-tile{
  background:var(--card);border-radius:13px;padding:11px;
  cursor:pointer;border:1px solid var(--border);
  box-shadow:var(--shadow);transition:transform .1s,border-color .1s;
  -webkit-user-select:none;user-select:none;
}
.cat-tile:active{transform:scale(.96);}
.tile-emoji{font-size:24px;margin-bottom:5px;}
.tile-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.2;}
.tile-ntd{font-size:11px;font-weight:600;}
.tile-mins{font-size:11px;font-weight:600;}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-sheet{
  background:var(--card);border-radius:22px 22px 0 0;
  width:100%;max-width:430px;padding:16px 18px 44px;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.34,1.2,.64,1);
}
.modal-overlay.show .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px;}

/* ── Auditor list ── */
.aud-list{display:flex;flex-direction:column;gap:8px;}
.aud-item{
  display:flex;align-items:center;gap:11px;padding:12px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:13px;cursor:pointer;
}
.aud-item:active{background:var(--bg);}
.aud-av{
  width:40px;height:40px;border-radius:11px;
  background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:20px;
}
.aud-item-name{font-size:14px;font-weight:600;}
.aud-item-role{font-size:11px;color:var(--sub);}
.aud-arrow{margin-left:auto;color:var(--border);font-size:18px;}

/* ── PIN ── */
.pin-section{display:none;}
.pin-section.show{display:block;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.pin-dot-el{
  width:44px;height:44px;border-radius:11px;
  background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:var(--sub);transition:all .1s;
}
.pin-dot-el.filled{background:var(--teal-light);border-color:var(--teal);color:var(--teal);}
.pin-input{
  width:100%;padding:13px;border:1.5px solid var(--border);border-radius:13px;
  font-size:24px;text-align:center;letter-spacing:8px;
  background:var(--bg);color:var(--text);outline:none;
}
.pin-input:focus{border-color:var(--teal);}
.pin-err{font-size:12px;color:#ff3b30;text-align:center;min-height:18px;margin:6px 0;}
.pin-ok{
  width:100%;padding:14px;background:var(--teal);color:#fff;
  border:none;border-radius:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;
}
.pin-ok:active{background:var(--teal-dim);}
.pin-back{
  width:100%;padding:10px;background:transparent;color:var(--sub);
  border:none;font-size:13px;cursor:pointer;margin-top:4px;
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(28,28,28,.92);color:#fff;
  padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;
  opacity:0;transition:all .22s;pointer-events:none;z-index:999;
  white-space:nowrap;max-width:calc(100vw - 40px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="navbar-title">🏅 KidsAPP</div>
  <button class="nav-btn" onclick="openSettings()" aria-label="設定">⚙️</button>
</div>

<!-- Child tabs -->
<div class="tabs-bar">
  <div class="tabs" id="childTabs"></div>
</div>

<!-- Main content -->
<div class="content">

  <!-- Auditor bar -->
  <div class="aud-bar">
    <div class="aud-dot" id="audDot"></div>
    <span class="aud-lbl">審核人：</span>
    <span class="aud-nm" id="audName">未登入</span>
    <button class="aud-switch" onclick="openAuditorModal()">切換 ›</button>
  </div>

  <!-- Profile card -->
  <div class="profile-card">
    <div class="avatar" id="childAvatar">👶</div>
    <div class="p-right">
      <div class="p-name" id="childName">連線中…</div>
      <div class="bal-ntd" id="balNTD"><span>—</span><span class="b-unit">NTD</span></div>
      <div class="bal-mins" id="balMins"><span>—</span><span class="b-unit">mins</span></div>
    </div>
  </div>

  <!-- Learning & Tasks (top 4) -->
  <div class="sec-lbl">🎯 Learning &amp; Tasks</div>
  <div class="cat-grid" id="gridTop"></div>

  <!-- Deductions (bottom 2) -->
  <div class="sec-lbl">📤 Deductions</div>
  <div class="cat-grid" id="gridBot"></div>

</div>

<!-- Auditor Modal -->
<div class="modal-overlay" id="modalAud" onclick="handleOverlay(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>

    <!-- Step 1: choose auditor -->
    <div id="step1">
      <div class="modal-title">選擇審核人</div>
      <div class="aud-list" id="audList"></div>
    </div>

    <!-- Step 2: PIN -->
    <div class="pin-section" id="step2">
      <div class="modal-title" id="pinTitle">輸入 PIN</div>
      <div class="pin-dots" id="pinDots">
        <div class="pin-dot-el">•</div>
        <div class="pin-dot-el">•</div>
        <div class="pin-dot-el">•</div>
        <div class="pin-dot-el">•</div>
      </div>
      <input type="password" inputmode="numeric" maxlength="4"
             class="pin-input" id="pinInput" placeholder="••••"
             oninput="handlePinInput()">
      <div class="pin-err" id="pinErr"></div>
      <button class="pin-ok" onclick="confirmPin()">確認登入</button>
      <button class="pin-back" onclick="backToStep1()">← 返回</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════ -->
<script>
/* ── Firebase Config ── */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBCuSVVPZGb76D4OKkIklOck50Mm-wbdsA",
  authDomain:        "kidsapp-e9a8d.firebaseapp.com",
  databaseURL:       "https://kidsapp-e9a8d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "kidsapp-e9a8d",
  storageBucket:     "kidsapp-e9a8d.firebasestorage.app",
  messagingSenderId: "240270025549",
  appId:             "1:240270025549:web:98777be0532c7cc97ecd04"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

/* ── Categories ── */
const CATS = [
  { id:'vocab',    name:'Vocabulary',  emoji:'📚', group:'top' },
  { id:'school',   name:'School Exam', emoji:'📝', group:'top' },
  { id:'housework',name:'Housework',   emoji:'🏠', group:'top' },
  { id:'sport',    name:'Sport',       emoji:'⚽', group:'top' },
  { id:'withdraw', name:'Withdraw',    emoji:'💸', group:'bot' },
  { id:'behavior', name:'Behavior',    emoji:'⭐', group:'bot' },
];

/* ── State ── */
const S = {
  children:       {},   // { childId: { name, emoji } }
  auditors:       {},   // { audId: { name, pin, emoji, role } }
  entries:        {},   // { childId: { catId: { entryId: {ntd,mins,...} } } }
  currentChildId: null,
  currentAuditor: null,
  pendingAuditor: null,
  rtListener:     null,
};

/* ── First-time setup (runs once on empty DB) ── */
const SEED = {
  auditors: {
    hang:   { name:'Hang',   pin:'1234', emoji:'👩', role:'家長' },
    albert: { name:'Albert', pin:'5678', emoji:'👨', role:'家長' },
  },
  children: {
    child_001: { name:'小明', emoji:'👦' },
    child_002: { name:'小花', emoji:'👧' },
  }
};

/* ── Init ── */
async function init() {
  try {
    /* Load or seed auditors */
    let audSnap = await db.ref('/auditors').once('value');
    if (!audSnap.exists()) {
      await db.ref('/auditors').set(SEED.auditors);
      audSnap = await db.ref('/auditors').once('value');
      showToast('✅ 初次設定完成，PIN: Hang=1234 / Albert=5678');
    }
    S.auditors = audSnap.val() || {};

    /* Load or seed children */
    let childSnap = await db.ref('/children').once('value');
    if (!childSnap.exists()) {
      await db.ref('/children').set(SEED.children);
      childSnap = await db.ref('/children').once('value');
    }
    S.children = childSnap.val() || {};
    S.currentChildId = Object.keys(S.children)[0] || null;

    /* Load entries + set real-time listener */
    if (S.currentChildId) {
      await loadEntries(S.currentChildId);
      attachListener(S.currentChildId);
    }

    renderAll();
  } catch(err) {
    console.error('KidsAPP init error:', err);
    showToast('⚠️ 無法連線 Firebase，請重新整理', 4000);
    document.getElementById('childName').textContent = '連線失敗';
  }
}

/* ── Load entries ── */
async function loadEntries(childId) {
  const snap = await db.ref(`/entries/${childId}`).once('value');
  S.entries[childId] = snap.val() || {};
}

/* ── Real-time listener for entries ── */
function attachListener(childId) {
  if (S.rtListener) db.ref(`/entries/${S.rtListener}`).off();
  S.rtListener = childId;
  db.ref(`/entries/${childId}`).on('value', snap => {
    S.entries[childId] = snap.val() || {};
    renderDashboard();
  });
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function renderAll() {
  renderTabs();
  renderAudBar();
  renderDashboard();
}

function renderTabs() {
  const el = document.getElementById('childTabs');
  el.innerHTML = Object.entries(S.children).map(([id, c]) =>
    `<button class="ctab ${id===S.currentChildId?'active':''}"
             onclick="selectChild('${id}')">${c.emoji} ${c.name}</button>`
  ).join('') +
  `<button class="ctab-add" onclick="addChild()">＋</button>`;
}

function renderAudBar() {
  const dot  = document.getElementById('audDot');
  const name = document.getElementById('audName');
  if (S.currentAuditor) {
    dot.classList.add('on');
    name.textContent = `${S.currentAuditor.emoji} ${S.currentAuditor.name}`;
  } else {
    dot.classList.remove('on');
    name.textContent = '未登入';
  }
}

function renderDashboard() {
  const child = S.children[S.currentChildId];
  if (!child) { document.getElementById('childName').textContent = '（無資料）'; return; }

  document.getElementById('childAvatar').textContent = child.emoji;
  document.getElementById('childName').textContent   = child.name;

  /* Totals */
  const entries = S.entries[S.currentChildId] || {};
  let ntdTotal = 0, minsTotal = 0;
  CATS.forEach(cat => {
    Object.values(entries[cat.id] || {}).forEach(e => {
      ntdTotal  += Number(e.ntd  || 0);
      minsTotal += Number(e.mins || 0);
    });
  });

  document.getElementById('balNTD').innerHTML =
    `<span>${ntdTotal.toLocaleString()}</span><span class="b-unit">NTD</span>`;
  document.getElementById('balMins').innerHTML =
    `<span>${minsTotal.toLocaleString()}</span><span class="b-unit">mins</span>`;

  /* Grids */
  renderGrid('gridTop', 'top', entries);
  renderGrid('gridBot', 'bot', entries);
}

function renderGrid(gridId, group, entries) {
  document.getElementById(gridId).innerHTML =
    CATS.filter(c => c.group === group).map(cat => {
      let ntd = 0, mins = 0;
      Object.values(entries[cat.id] || {}).forEach(e => {
        ntd  += Number(e.ntd  || 0);
        mins += Number(e.mins || 0);
      });
      const nc = ntd  < 0 ? '#c94010' : ntd  > 0 ? '#0e5570' : '#8e8e93';
      const mc = mins < 0 ? '#c94010' : mins > 0 ? '#0e5570' : '#8e8e93';
      const ns = ntd  === 0 ? '— NTD'  : `${ntd>0?'+':''}${ntd.toLocaleString()} NTD`;
      const ms = mins === 0 ? '— mins' : `${mins>0?'+':''}${mins.toLocaleString()} mins`;
      return `<div class="cat-tile" onclick="openCat('${cat.id}')">
        <div class="tile-emoji">${cat.emoji}</div>
        <div class="tile-name">${cat.name}</div>
        <div class="tile-ntd"  style="color:${nc};">${ns}</div>
        <div class="tile-mins" style="color:${mc};">${ms}</div>
      </div>`;
    }).join('');
}

/* ══════════════════════════════
   ACTIONS
══════════════════════════════ */
function selectChild(id) {
  if (id === S.currentChildId) return;
  S.currentChildId = id;
  loadEntries(id).then(() => { renderAll(); attachListener(id); });
}

function addChild()       { showToast('➕ 新增孩子（Phase 4 實作）'); }
function openSettings()   { showToast('⚙️ 設定頁面（Phase 4 實作）'); }
function openCat(catId) {
  const cat = CATS.find(c => c.id === catId);
  showToast(`${cat.emoji} ${cat.name} — 詳細記錄（Phase 2 實作）`);
}

/* ══════════════════════════════
   AUDITOR MODAL
══════════════════════════════ */
function openAuditorModal() {
  document.getElementById('audList').innerHTML =
    Object.entries(S.auditors).map(([id, a]) =>
      `<div class="aud-item" onclick="selectAuditor('${id}')">
        <div class="aud-av">${a.emoji}</div>
        <div>
          <div class="aud-item-name">${a.name}</div>
          <div class="aud-item-role">${a.role}</div>
        </div>
        <div class="aud-arrow">›</div>
      </div>`
    ).join('');
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').classList.remove('show');
  showModal('modalAud');
}

function selectAuditor(id) {
  const a = S.auditors[id];
  S.pendingAuditor = { id, ...a };
  document.getElementById('pinTitle').textContent = `${a.emoji} ${a.name}`;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinErr').textContent = '';
  updateDots(0);
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').classList.add('show');
  setTimeout(() => document.getElementById('pinInput').focus(), 120);
}

function handlePinInput() {
  const val = document.getElementById('pinInput').value;
  document.getElementById('pinErr').textContent = '';
  updateDots(val.length);
  if (val.length === 4) setTimeout(confirmPin, 160);
}

function updateDots(n) {
  document.querySelectorAll('#pinDots .pin-dot-el').forEach((d, i) => {
    d.textContent = i < n ? '●' : '•';
    d.classList.toggle('filled', i < n);
  });
}

function confirmPin() {
  const pin = document.getElementById('pinInput').value;
  if (pin !== S.pendingAuditor.pin) {
    document.getElementById('pinErr').textContent = '❌ PIN 錯誤，請再試一次';
    document.getElementById('pinInput').value = '';
    updateDots(0);
    return;
  }
  S.currentAuditor = { ...S.pendingAuditor };
  S.pendingAuditor = null;
  closeModal('modalAud');
  renderAudBar();
  showToast(`✅ 歡迎，${S.currentAuditor.name}！`);
}

function backToStep1() {
  document.getElementById('step2').classList.remove('show');
  document.getElementById('step1').style.display = 'block';
  S.pendingAuditor = null;
}

function handleOverlay(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal('modalAud');
}

/* ══════════════════════════════
   MODAL HELPERS
══════════════════════════════ */
function showModal(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(() => el.classList.add('show'));
}
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('show');
  setTimeout(() => { el.style.display = 'none'; }, 300);
}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
let _tt;
function showToast(msg, ms = 2600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), ms);
}

/* ══════════════════════════════
   SERVICE WORKER
══════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('KidsAPP SW:', r.scope))
      .catch(e => console.error('KidsAPP SW error:', e));
  });
}

/* ── Boot ── */
init();
</script>

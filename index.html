<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KidsAPP · 輸入模擬 v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,sans-serif;background:#04091a;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 12px 48px;}
h1{font-size:17px;font-weight:700;color:#fff;}
.sub{font-size:11px;opacity:.35;color:#fff;text-align:center;}

.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;max-width:360px;}
.tab{padding:6px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);font-size:11px;font-weight:600;
  color:rgba(255,255,255,.4);cursor:pointer;white-space:nowrap;}
.tab.on{border-color:rgba(72,196,255,.5);background:rgba(72,196,255,.14);color:#48c4ff;}

/* iPhone */
.iphone{width:300px;background:linear-gradient(145deg,#2f2f2f,#1a1a1a);
  border-radius:52px;padding:10px;
  box-shadow:0 0 0 1px rgba(255,255,255,.1),0 32px 80px rgba(0,0,0,.9);position:relative;}
.iphone::before{content:'';position:absolute;left:-3px;top:96px;width:3px;height:30px;
  background:#3c3c3c;border-radius:2px 0 0 2px;box-shadow:0 40px 0 #3c3c3c;}
.iphone::after{content:'';position:absolute;right:-3px;top:118px;width:3px;height:58px;
  background:#3c3c3c;border-radius:0 2px 2px 0;}
.screen{width:280px;height:560px;border-radius:44px;overflow:hidden;
  position:relative;background:#07102a;display:flex;flex-direction:column;justify-content:flex-end;}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:80px;height:24px;background:#000;border-radius:14px;z-index:30;}
.bg-dim{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:5;}

/* Sheet */
.sheet{position:relative;z-index:10;background:#0d1a40;
  border-radius:22px 22px 0 0;border-top:1px solid rgba(255,255,255,.1);
  padding:10px 14px 22px;}
.handle{width:32px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 10px;}
.sh-title{font-size:15px;font-weight:700;text-align:center;color:#e8f4ff;margin-bottom:10px;}
.date-row{background:rgba(255,255,255,.05);border-radius:9px;padding:7px 11px;
  margin-bottom:10px;font-size:13px;color:rgba(180,210,230,.65);}

/* ═══ SINGLE-BORDER 3-COLUMN ROW ═══
   One outer border, internal dividers only, all centered
   Height: 64px — matches 30px number naturally
*/
.input-row{
  display:flex;
  height:64px;
  background:#071830;
  border:2px solid rgba(72,196,255,.45);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:12px;
}

/* Number column */
.col-num{
  flex:5;
  display:flex;align-items:center;justify-content:center;
}

.col-num input{
  background:none;border:none;outline:none;
  font-size:30px;font-weight:800;color:#48c4ff;
  width:100%;text-align:center;
  font-family:-apple-system,sans-serif;
  padding:0 6px;
}
.col-num input::placeholder{color:rgba(72,196,255,.2);}

/* Picker columns — no inner box, just the value centered */
.col-pick{
  flex:3;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  position:relative;
  transition:background .1s;
}
/* no dividers */
.col-pick:active{background:rgba(72,196,255,.08);}

/* The selected value text */
.pick-val{
  font-size:15px;font-weight:700;color:#fff;
  text-align:center;
  pointer-events:none;
  user-select:none;
  line-height:1.2;
}
/* Small hint arrows */
.pick-arrows{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:3px;opacity:.7;
  pointer-events:none;
}
.pick-arrows span{font-size:10px;color:#48c4ff;line-height:1;}

/* Notes */
.notes-box{
  width:100%;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.08);border-radius:10px;
  padding:8px 11px;font-size:13px;color:rgba(180,210,230,.6);
  resize:none;font-family:-apple-system,sans-serif;outline:none;
  line-height:1.5;display:block;margin-bottom:10px;
}

/* Buttons */
.btn-row{display:flex;gap:7px;}
.btn-c{flex:1;padding:11px;background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.1);border-radius:11px;
  font-size:13px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;}
.btn-s{flex:1;padding:11px;background:#48c4ff;border:none;border-radius:11px;
  font-size:13px;font-weight:700;color:#07102a;cursor:pointer;}
</style>
</head>
<body>

<h1>輸入方式模擬 v3</h1>
<div class="sub">單一外框 · 文字置中 · 上下滑動或點擊切換</div>

<div class="tabs">
  <div class="tab on"  onclick="go('tx')">💳 Transaction</div>
  <div class="tab" onclick="go('vocab')">📚 Vocabulary</div>
  <div class="tab" onclick="go('school')">📝 School Exam</div>
  <div class="tab" onclick="go('hw')">🏠 Housework</div>
  <div class="tab" onclick="go('sport')">⚽ Sport</div>
  <div class="tab" onclick="go('behav')">⭐ Behavior</div>
</div>

<div class="iphone">
  <div class="screen">
    <div class="island"></div>
    <div class="bg-dim"></div>
    <div class="sheet">
      <div class="handle"></div>
      <div class="sh-title" id="shTitle">💳 Transaction</div>
      <div class="date-row">📅 2026 Jul 01</div>

      <!-- Single-border 3-col row -->
      <div class="input-row">
        <div class="col-num">
          <input type="number" inputmode="decimal" placeholder="0" id="numInput">
        </div>
        <div class="col-pick" id="colUnit" ontouchstart="ts(event,'unit')" ontouchend="te(event,'unit')" onclick="tap('unit')">
          <div class="pick-val" id="valUnit">NTD</div>
          <div class="pick-arrows"><span>▲</span><span>▼</span></div>
        </div>
        <div class="col-pick" id="colType" ontouchstart="ts(event,'type')" ontouchend="te(event,'type')" onclick="tap('type')">
          <div class="pick-val" id="valType">Deposit</div>
          <div class="pick-arrows"><span>▲</span><span>▼</span></div>
        </div>
      </div>

      <textarea class="notes-box" id="notesEl" rows="2" placeholder="備註（選填）"></textarea>

      <div class="btn-row">
        <button class="btn-c">取消</button>
        <button class="btn-s">儲存</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATS={
  tx:   {title:'💳 Transaction', units:['NTD','Mins'], types:['Deposit','Withdraw'], uI:0, tI:0, note:'備註（選填）'},
  vocab:{title:'📚 Vocabulary',  units:['Mins','NTD'], types:['+','-'],              uI:0, tI:0, note:'今天背的單字…'},
  school:{title:'📝 School Exam',units:['Mins','NTD'], types:['+','-'],              uI:1, tI:0, note:'備註（選填）'},
  hw:   {title:'🏠 Housework',   units:['Mins','NTD'], types:['+','-'],              uI:0, tI:0, note:'備註（選填）'},
  sport:{title:'⚽ Sport',       units:['Mins','NTD'], types:['+','-'],              uI:0, tI:0, note:'備註（選填）'},
  behav:{title:'⭐ Behavior',    units:['Mins','NTD'], types:['嘉獎','懲罰'],        uI:0, tI:0, note:'備註（選填）'},
};

let cur='tx';
let uIdx=0, tIdx=0;
let touchY={unit:0,type:0};

function go(k){
  cur=k;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('on',['tx','vocab','school','hw','sport','behav'][i]===k);
  });
  const c=CATS[k];
  document.getElementById('shTitle').textContent=c.title;
  document.getElementById('notesEl').placeholder=c.note;
  document.getElementById('numInput').value='';
  uIdx=c.uI; tIdx=c.tI;
  render();
}

function render(){
  const c=CATS[cur];
  document.getElementById('valUnit').textContent=c.units[uIdx];
  document.getElementById('valType').textContent=c.types[tIdx];
}

/* Touch handlers for swipe */
function ts(e,which){
  touchY[which]=e.touches[0].clientY;
}
function te(e,which){
  const dy=touchY[which]-e.changedTouches[0].clientY;
  const c=CATS[cur];
  if(Math.abs(dy)<8){return;} // handled by onclick tap
  if(which==='unit') uIdx=(uIdx+(dy>0?1:-1)+c.units.length)%c.units.length;
  else               tIdx=(tIdx+(dy>0?1:-1)+c.types.length)%c.types.length;
  render();
}
/* Tap = cycle to next */
function tap(which){
  const c=CATS[cur];
  if(which==='unit') uIdx=(uIdx+1)%c.units.length;
  else               tIdx=(tIdx+1)%c.types.length;
  render();
}

go('tx');
</script>
</body>
</html>

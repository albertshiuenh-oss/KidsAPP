<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KidsAPP · 新輸入方式模擬</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#04091a;min-height:100vh;padding:24px 10px 48px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:14px;}
h1{font-size:17px;font-weight:700;}
.sub{font-size:11px;opacity:.35;}

/* Category tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:500px;}
.tab{padding:6px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:11px;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab.on{border-color:rgba(72,196,255,.5);background:rgba(72,196,255,.14);color:#48c4ff;}

/* iPhone */
.iphone{width:232px;background:linear-gradient(145deg,#2f2f2f,#1a1a1a);border-radius:52px;padding:10px;box-shadow:0 0 0 1px rgba(255,255,255,.1),0 36px 100px rgba(0,0,0,.9);position:relative;}
.iphone::before{content:'';position:absolute;left:-3px;top:96px;width:3px;height:30px;background:#3c3c3c;border-radius:2px 0 0 2px;box-shadow:0 40px 0 #3c3c3c;}
.iphone::after{content:'';position:absolute;right:-3px;top:122px;width:3px;height:58px;background:#3c3c3c;border-radius:0 2px 2px 0;}
.screen{width:212px;height:460px;border-radius:44px;overflow:hidden;position:relative;background:#070d18;}
.island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:86px;height:25px;background:#000;border-radius:16px;z-index:30;}

/* Dimmed background */
.bg-dim{position:absolute;inset:0;background:#07102a;z-index:1;}

/* Bottom sheet modal — real 393×852 scaled 0.540 */
.sheet-wrap{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:10;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet{background:#0d1a40;border-radius:20px 20px 0 0;padding:12px 14px 32px;border-top:1px solid rgba(255,255,255,.1);
  /* scale 0.540 from real sizes */
  transform:scale(0.540);transform-origin:bottom center;
  width:393px;margin-left:calc((212px - 393px*0.540)/2 / 0.540);
}
.handle{width:32px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 12px;}
.title{font-size:16px;font-weight:700;text-align:center;margin-bottom:14px;color:#e8f4ff;}

/* Date row */
.date-row{background:#0a1535;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:14px;color:rgba(180,210,230,.6);}
.date-lbl{font-size:10px;color:rgba(180,210,230,.4);margin-bottom:3px;font-weight:600;}

/* ── 3-column input row ── */
.input-row{display:flex;gap:8px;margin-bottom:12px;height:132px;}

/* Col 1: Number */
.col-num{flex:2;display:flex;flex-direction:column;}
.col-lbl{font-size:10px;font-weight:600;color:rgba(180,210,230,.4);margin-bottom:5px;text-align:center;}
.num-input-box{flex:1;background:#0a1535;border:2px solid rgba(72,196,255,.35);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;}
.num-input-box input{background:none;border:none;outline:none;font-size:32px;font-weight:800;color:#48c4ff;width:100%;text-align:center;font-family:-apple-system,sans-serif;padding:0 6px;}
.num-input-box input::placeholder{color:rgba(72,196,255,.3);}

/* Col 2+3: Pickers */
.col-pick{flex:1;display:flex;flex-direction:column;}
.picker-wrap{
  flex:1;
  background:#0a1535;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;
  overflow:hidden;position:relative;
  user-select:none;
}
/* center highlight band */
.picker-wrap::before{
  content:'';position:absolute;top:44px;left:0;right:0;height:44px;
  border-top:1px solid rgba(72,196,255,.35);
  border-bottom:1px solid rgba(72,196,255,.35);
  z-index:3;pointer-events:none;
}
/* top fade */
.picker-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    #0a1535 0%,
    transparent 30%,
    transparent 70%,
    #0a1535 100%
  );
  z-index:2;pointer-events:none;
}
.picker-list{
  position:absolute;width:100%;
  transition:transform .2s cubic-bezier(0.34,1.2,0.64,1);
}
.picker-item{
  height:44px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,255,255,.3);font-weight:500;
  cursor:pointer;transition:all .15s;z-index:4;position:relative;
  white-space:nowrap;
}
.picker-item.sel{
  font-size:16px;font-weight:700;color:#fff;
}

/* Notes */
.notes-row{margin-bottom:12px;}
.notes-box{width:100%;background:#0a1535;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;
  padding:10px 12px;font-size:13px;color:rgba(180,210,230,.5);resize:none;font-family:inherit;outline:none;line-height:1.5;}

/* Buttons */
.btn-row{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:13px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;font-size:15px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;}
.btn-save{flex:1;padding:13px;background:#48c4ff;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#07102a;cursor:pointer;}

/* label */
.cat-label{font-size:12px;color:rgba(180,210,230,.5);text-align:center;max-width:220px;line-height:1.8;}
</style>
</head>
<body>

<h1>新輸入方式模擬</h1>
<div class="sub">數字 + 單位滾輪 + 類型滾輪 · 三欄並排</div>

<div class="tabs" id="tabs">
  <div class="tab on" onclick="show('tx')">💳 Transaction</div>
  <div class="tab" onclick="show('vocab')">📚 Vocabulary</div>
  <div class="tab" onclick="show('behav')">⭐ Behavior</div>
</div>

<div class="iphone">
  <div class="screen">
    <div class="island"></div>
    <div class="bg-dim"></div>
    <div class="sheet-wrap">
      <div class="sheet" id="sheet">
        <!-- injected by JS -->
      </div>
    </div>
  </div>
</div>

<div class="cat-label" id="note"></div>

<script>
// ── Picker class ──
class Picker {
  constructor(el, items, selIdx=0, onChange){
    this.el=el; this.items=items; this.sel=selIdx; this.onChange=onChange;
    this.itemH=44;
    this.render();
  }
  render(){
    // 3 padding slots top+bottom so selected item sits in center
    const pad='<div class="picker-item" style="pointer-events:none;height:44px;"></div>';
    this.el.innerHTML=`<div class="picker-list" id="pl_${Math.random().toString(36).substr(2,5)}">
      ${pad}
      ${this.items.map((t,i)=>`<div class="picker-item${i===this.sel?' sel':''}" data-i="${i}">${t}</div>`).join('')}
      ${pad}
    </div>`;
    this.list=this.el.querySelector('.picker-list');
    this.updatePos(false);
    // click
    this.el.addEventListener('click',e=>{
      const it=e.target.closest('[data-i]');
      if(!it)return;
      this.setSel(parseInt(it.dataset.i));
    });
    // touch scroll
    let sy=0,moved=false;
    this.el.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;moved=false;},{passive:true});
    this.el.addEventListener('touchmove',e=>{
      const dy=sy-e.touches[0].clientY;
      if(Math.abs(dy)>6)moved=true;
      if(moved)e.preventDefault();
    },{passive:false});
    this.el.addEventListener('touchend',e=>{
      if(!moved)return;
      const dy=sy-e.changedTouches[0].clientY;
      if(dy>20)this.setSel(Math.min(this.sel+1,this.items.length-1));
      else if(dy<-20)this.setSel(Math.max(this.sel-1,0));
    },{passive:true});
  }
  setSel(i){
    this.sel=i;
    this.el.querySelectorAll('[data-i]').forEach((el,j)=>el.classList.toggle('sel',j===i));
    this.updatePos(true);
    if(this.onChange)this.onChange(this.items[i],i);
  }
  updatePos(anim){
    if(!this.list)return;
    this.list.style.transition=anim?'transform .2s cubic-bezier(0.34,1.2,0.64,1)':'none';
    this.list.style.transform=`translateY(${-this.sel*this.itemH}px)`;
  }
  val(){return this.items[this.sel];}
}

const CONFIGS = {
  tx:{
    title:'💳 Transaction',
    units:['NTD','Mins'],
    types:['Withdraw','Deposit'],
    unitSel:0, typeSel:0,
    placeholder:'300',
    note:'Transaction：數字 | NTD/Mins | Withdraw/Deposit\n三欄並排，單位和操作各自滾輪選擇',
    notesLabel:'📝 備註',
  },
  vocab:{
    title:'📚 Vocabulary',
    units:['Mins','NTD'],
    types:['+','-'],
    unitSel:0, typeSel:0,
    placeholder:'60',
    note:'Vocabulary：數字 | Mins/NTD | +/-\n學習類預設 Mins 正值',
    notesLabel:'📚 今天背的單字',
  },
  behav:{
    title:'⭐ Behavior',
    units:['Mins','NTD'],
    types:['嘉獎','懲罰'],
    unitSel:0, typeSel:0,
    placeholder:'30',
    note:'Behavior：數字 | Mins/NTD | 嘉獎/懲罰\n操作類型用滾輪切換',
    notesLabel:'📝 備註',
  },
};

let pUnit=null, pType=null;

function show(key){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const keys=['tx','vocab','behav'];
    t.classList.toggle('on', keys[i]===key);
  });
  const cfg=CONFIGS[key];
  document.getElementById('note').textContent=cfg.note;

  document.getElementById('sheet').innerHTML=`
    <div class="handle"></div>
    <div class="title">${cfg.title}</div>

    <div class="date-row">
      <div class="date-lbl">📅 日期</div>
      2026 Jul 01
    </div>

    <div style="display:flex;gap:5px;margin-bottom:5px;">
      <div style="flex:2;font-size:10px;font-weight:600;color:rgba(180,210,230,.4);text-align:center;">數字</div>
      <div style="flex:1;font-size:10px;font-weight:600;color:rgba(180,210,230,.4);text-align:center;">單位</div>
      <div style="flex:1;font-size:10px;font-weight:600;color:rgba(180,210,230,.4);text-align:center;">操作</div>
    </div>

    <div class="input-row">
      <!-- Number -->
      <div class="col-num">
        <div class="num-input-box">
          <input type="number" placeholder="${cfg.placeholder}" inputmode="decimal">
        </div>
      </div>
      <!-- Unit picker -->
      <div class="col-pick">
        <div class="picker-wrap" id="pickUnit"></div>
      </div>
      <!-- Type picker -->
      <div class="col-pick">
        <div class="picker-wrap" id="pickType"></div>
      </div>
    </div>

    <div class="notes-row">
      <textarea class="notes-box" rows="3" placeholder="${cfg.notesLabel}…"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-cancel">取消</button>
      <button class="btn-save">儲存</button>
    </div>
  `;

  pUnit = new Picker(document.getElementById('pickUnit'), cfg.units, cfg.unitSel);
  pType = new Picker(document.getElementById('pickType'), cfg.types, cfg.typeSel);
}

show('tx');
</script>
</body>
</html>

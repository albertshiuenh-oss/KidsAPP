<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KidsAPP</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07102a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="KidsAPP">
<link rel="apple-touch-icon" href="icon-180.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07102a;
  --cyan:#48c4ff;--cyan-dim:rgba(72,196,255,.14);--cyan-border:rgba(72,196,255,.35);
  --orange:#ff8040;--orange-dim:rgba(255,128,64,.12);--orange-border:rgba(255,128,64,.3);
  --green:#00b248;--green-dim:rgba(0,178,72,.18);--green-border:rgba(0,178,72,.4);
  --red:#c81c1c;--red-dim:rgba(200,28,28,.2);
  --teal:#30d5f5;--teal-dim:rgba(48,213,245,.12);--teal-border:rgba(48,213,245,.25);
  --amber:#ff7043;
  --text:#e8f4ff;--sub:rgba(180,210,230,.45);--border:rgba(255,255,255,.08);
  --sys-green:#34c759;--del-red:#ff5252;
  --card:#0d1e50;--card2:#0a1640;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
body{font-family:-apple-system,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100svh;-webkit-font-smoothing:antialiased;}
.screen{display:none;}.screen.active{display:flex;flex-direction:column;}#screenHome{overflow:hidden;position:relative;}

/* в”Җв”Җ NAVBAR в”Җв”Җ */
.navbar{background:rgba(7,16,42,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--text);padding:13px 16px 11px;display:flex;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-title{font-size:18px;font-weight:800;color:#fff;flex:1;letter-spacing:-.3px;}
.nav-title span{color:#f9c642;}
.nav-btn{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-back{background:none;border:none;color:var(--cyan);font-size:22px;font-weight:600;cursor:pointer;padding:0;margin-right:10px;}
.nav-center{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:700;flex:1;}
.nav-badges{display:flex;gap:4px;margin-left:auto;}
.nav-badge{background:var(--cyan-dim);color:var(--cyan);font-size:9px;padding:2px 7px;border-radius:7px;border:1px solid var(--cyan-border);white-space:nowrap;}

/* Auditor chip */
.aud-chip{display:flex;align-items:center;gap:5px;background:var(--cyan-dim);border:1.5px solid var(--cyan-border);border-radius:20px;padding:4px 10px 4px 5px;margin-right:8px;cursor:pointer;}
.aud-chip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;background:rgba(72,196,255,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.aud-chip-av img{width:100%;height:100%;object-fit:cover;display:block;}
.aud-chip-name{font-size:10px;font-weight:600;color:var(--cyan);white-space:nowrap;}
.aud-chip-offline{background:rgba(255,255,255,.05);border-color:var(--border);}
.aud-chip-offline .aud-chip-name{color:var(--sub);}

/* в”Җв”Җ HOME BODY в”Җв”Җ */
.home-body{flex:1;display:flex;flex-direction:column;padding:8px 14px 6px;gap:7px;overflow:hidden;}

/* Swipe dots */
.swipe-dots{display:flex;align-items:center;justify-content:center;gap:5px;height:12px;flex-shrink:0;}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s;}
.sdot.on{width:18px;border-radius:3px;background:var(--cyan);}

/* в”Җв”Җ PROFILE CARD (new: gradient bg, square avatar, 2-col stats) в”Җв”Җ */
.profile-card{
  background:linear-gradient(135deg,#0e2080 0%,#380860 100%);
  border-radius:18px;display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  flex:0 0 clamp(120px,17svh,158px);
  border:2px solid rgba(72,196,255,.35);
  box-shadow:0 0 36px rgba(72,196,255,.18),0 0 60px rgba(140,30,200,.1);
}
.p-avatar-box{
  width:94px;height:94px;border-radius:18px;
  overflow:hidden;flex-shrink:0;
  border:2.5px solid rgba(72,196,255,.7);
  box-shadow:0 0 24px rgba(72,196,255,.4);
  background:#061830;display:flex;align-items:center;justify-content:center;font-size:42px;
}
.p-avatar-box img{width:100%;height:100%;object-fit:cover;display:block;}
.p-info{flex:1;display:flex;flex-direction:column;gap:8px;}
.p-name{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.p-stats{display:flex;gap:18px;}
.p-stat{display:flex;flex-direction:column;gap:2px;}
.p-stat-lbl{font-size:12px;color:rgba(255,255,255,.55);font-weight:500;}
.p-stat-num{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1;}
.p-stat-num.t{color:#48c4ff;}
.p-stat-num.o{color:#ff8040;}

/* в”Җв”Җ SECTION HEADERS в”Җв”Җ */
.sec-hdr{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;flex-shrink:0;height:18px;}

/* в”Җв”Җ GRID SECTIONS в”Җв”Җ */
/* svh-based heights вҖ” no flex-grow, so iOS Safari always renders tiles */
.grid-section{display:flex;flex-direction:column;gap:5px;flex-shrink:0;
  height:clamp(190px,34svh,272px);}
.grid-section-bot{display:flex;flex-direction:column;gap:5px;flex-shrink:0;
  height:clamp(110px,17svh,136px);}
.cat-grid{flex:1;min-height:0;height:0;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-grid-2row{grid-template-rows:1fr 1fr;}

/* в”Җв”Җ TILES (emoji + name only, no values) в”Җв”Җ */
.cat-tile{
  border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  overflow:hidden;min-height:0;cursor:pointer;
  position:relative;border:1px solid rgba(255,255,255,.08);
  transition:transform .1s;-webkit-user-select:none;user-select:none;
}
.cat-tile:active{transform:scale(.96);}
.cat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.07),transparent);pointer-events:none;}
/* Category gradients */
.tile-vocab  {background:linear-gradient(145deg,#0e1e6a,#162890);border-color:rgba(60,100,255,.2);}
.tile-school {background:linear-gradient(145deg,#14063a,#5a16a8);border-color:rgba(120,60,255,.2);}
.tile-hw     {background:linear-gradient(145deg,#052214,#187040);border-color:rgba(30,150,80,.2);}
.tile-sport  {background:linear-gradient(145deg,#2a0800,#b03010);border-color:rgba(200,80,20,.2);}
.tile-trans  {background:linear-gradient(145deg,#261800,#503000);border-color:rgba(200,140,20,.2);}
.tile-behav  {background:linear-gradient(145deg,#1a0428,#6010a0);border-color:rgba(160,40,180,.2);}
.tile-behav-neg{background:linear-gradient(145deg,#3a0820,#6a1030);border-color:rgba(200,30,60,.2);}
.tile-emoji{font-size:54px;line-height:1;position:relative;z-index:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}
.tile-name{font-size:15px;font-weight:700;color:#fff;text-align:center;position:relative;z-index:1;}

/* в”Җв”Җ DETAIL PAGE в”Җв”Җ */
.detail-body{flex:1;overflow-y:auto;scrollbar-width:none;}
.detail-body::-webkit-scrollbar{display:none;}
.detail-pad{padding:10px 14px 50px;}

/* Goal stats strip */
.goal-stats-strip{display:flex;gap:5px;padding:10px 14px 0;}
.gstat-card{flex:1;background:var(--card);border-radius:10px;padding:8px 10px;border:1px solid var(--teal-border);text-align:center;}
.gstat-card.o{border-color:var(--orange-border);}
.gstat-lbl{font-size:8px;color:var(--sub);margin-bottom:2px;}
.gstat-val{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.gstat-val.t{color:var(--teal);}
.gstat-val.o{color:var(--amber);}
.gstat-unit{font-size:8px;color:var(--sub);}
.gadd-goal-btn{width:52px;background:var(--card);border-radius:10px;border:1px solid var(--teal-border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;cursor:pointer;}
.gadd-goal-btn:active{background:var(--card2);}
.gadd-plus{font-size:20px;color:var(--teal);font-weight:300;line-height:1;}
.gadd-lbl{font-size:7px;color:rgba(48,213,245,.5);}

/* Goal section */
.goal-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 1px;margin-bottom:6px;}
.add-goal-btn{font-size:10px;font-weight:600;color:var(--teal);background:var(--teal-dim);border:none;border-radius:8px;padding:4px 10px;cursor:pointer;}
.goal-card{background:var(--card);border-radius:13px;padding:11px 12px;margin-bottom:6px;border:1px solid var(--teal-border);}
.goal-card.completed{opacity:.5;border-color:var(--border);border-style:dashed;}
.goal-freq-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.goal-freq-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-border);}
.goal-freq-badge.recurring{background:rgba(255,213,79,.1);color:#ffd54f;border-color:rgba(255,213,79,.2);}
.goal-desc{font-size:11px;color:var(--text);margin-bottom:7px;line-height:1.4;}
.goal-rewards{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.goal-reward-pill{font-size:9px;font-weight:600;padding:3px 8px;border-radius:7px;}
.reward-pass{background:var(--green-dim);color:var(--green);}
.reward-fail{background:var(--orange-dim);color:var(--amber);}
.goal-verify-row{display:flex;gap:5px;}
.btn-pass{flex:1;padding:8px;background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-fail{flex:1;padding:8px;background:var(--orange-dim);color:var(--amber);border:1px solid var(--orange-border);border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}
.goal-completed-badge{font-size:10px;padding:3px 8px;border-radius:7px;background:rgba(255,255,255,.06);color:var(--sub);margin-left:auto;}
.no-goals{text-align:center;padding:16px;color:var(--sub);font-size:11px;background:var(--card);border-radius:12px;border:1px dashed var(--border);}

/* Records */
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);padding:0 1px;margin-bottom:5px;}
.add-rec-btn{width:100%;padding:11px;background:var(--card);color:var(--teal);border:1px solid var(--teal-border);border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.add-rec-btn:active{background:var(--card2);}
.add-rec-btn.locked{color:var(--sub);border-color:var(--border);cursor:default;}
.rec-card{background:var(--card);border-radius:11px;padding:10px 12px;margin-bottom:5px;border:1px solid var(--border);}
.rec-card.deleted-card{opacity:.6;border-style:dashed;}
.rec-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.rec-date{font-size:10px;color:var(--sub);}
.rec-aud{font-size:10px;color:var(--sub);}
.rec-badge{font-size:9px;padding:1px 7px;border-radius:5px;font-weight:600;}
.rec-badge.pass{background:var(--green-dim);color:var(--green);}
.rec-badge.fail{background:var(--orange-dim);color:var(--amber);}
.tx-type-badge{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;}
.tx-withdraw{background:var(--orange-dim);color:var(--amber);}
.tx-deposit{background:var(--green-dim);color:var(--green);}
.rec-actions{display:flex;gap:3px;margin-left:auto;}
.rec-act{width:26px;height:26px;border:none;border-radius:7px;background:rgba(255,255,255,.05);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.rec-act.del{background:rgba(255,82,82,.12);}
.rec-amts{display:flex;gap:7px;margin-bottom:2px;}
.rec-amt{font-size:12px;font-weight:700;}
.pos{color:var(--teal);}.neg{color:var(--amber);}
.rec-note,.rec-edited{font-size:10px;color:var(--sub);}
.rec-edited{font-style:italic;}
.restore-btn{font-size:10px;padding:3px 9px;background:var(--teal-dim);color:var(--teal);border:none;border-radius:7px;cursor:pointer;font-weight:600;white-space:nowrap;}
.days-left{font-size:9px;color:var(--del-red);margin-left:auto;}
.empty-state{text-align:center;padding:28px 16px;color:var(--sub);font-size:12px;line-height:1.8;}

/* Transactions */
.tx-summary{display:flex;gap:5px;margin-bottom:8px;}
.tx-sum-card{flex:1;background:var(--card);border-radius:10px;padding:8px 10px;border:1px solid var(--teal-border);}
.tx-sum-card.o{border-color:var(--orange-border);}
.tx-sum-label{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--sub);margin-bottom:2px;}
.tx-sum-val{font-size:13px;font-weight:700;}
.filter-row{display:flex;gap:5px;margin-bottom:8px;}
.filter-btn{flex:1;padding:6px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:10px;font-weight:600;color:var(--sub);cursor:pointer;}
.filter-btn.active{border-color:var(--teal);background:var(--teal-dim);color:var(--teal);}

/* Settings */
.settings-section{background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);}
.settings-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--border);}
.settings-section-title{font-size:12px;font-weight:700;color:var(--text);}
.settings-add-btn{font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-dim);border:none;border-radius:7px;padding:3px 9px;cursor:pointer;}
.person-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border);}
.person-row:last-child{border-bottom:none;}
.person-av{width:44px;height:44px;border-radius:10px;background:var(--teal-dim);border:1.5px solid var(--teal-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.person-av img{width:100%;height:100%;object-fit:cover;display:block;}
.person-name{font-size:13px;font-weight:600;color:var(--text);}
.person-sub{font-size:10px;color:var(--sub);margin-top:1px;}
.person-acts{display:flex;gap:5px;margin-left:auto;}
.person-act{width:28px;height:28px;border:none;border-radius:7px;background:rgba(255,255,255,.05);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.person-act.del{background:rgba(255,82,82,.1);}
.settings-info{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);text-align:center;}
.settings-info-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.settings-info-sub{font-size:11px;color:var(--sub);margin-bottom:12px;}
.cache-clear-btn{width:100%;padding:11px;background:rgba(255,82,82,.1);color:#ff5252;border:1px solid rgba(255,82,82,.22);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}

/* Photo picker */
.photo-picker-area{text-align:center;margin-bottom:14px;}
.photo-preview-box{width:86px;height:86px;border-radius:17px;background:var(--teal-dim);border:2px solid var(--teal-border);margin:0 auto 8px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:36px;}
.photo-preview-box img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-pick-btn{font-size:11px;color:var(--teal);background:none;border:none;cursor:pointer;}
.pin-toggle-btn{width:100%;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;text-align:left;font-size:12px;color:var(--teal);cursor:pointer;margin-bottom:4px;}
.pin-change-section{background:var(--card2);border-radius:9px;padding:11px;border:1px solid var(--border);margin-bottom:10px;}
.pin-change-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:18px;text-align:center;letter-spacing:6px;background:var(--bg);color:var(--text);outline:none;margin-bottom:7px;font-family:inherit;}
.pin-change-input:focus{border-color:var(--teal);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-sheet{background:#0d1a40;border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:15px 17px 44px;transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.2,.64,1);max-height:90vh;overflow-y:auto;border-top:1px solid var(--border);}
.modal-overlay.show .modal-sheet{transform:translateY(0);}
.modal-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 15px;}
.modal-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:13px;color:var(--text);}

/* Auditor list */
.aud-list{display:flex;flex-direction:column;gap:7px;}
.aud-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;}
.aud-item:active{background:var(--card2);}
.aud-av{width:38px;height:38px;border-radius:10px;background:var(--teal-dim);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;}
.aud-av img{width:100%;height:100%;object-fit:cover;display:block;}
.aud-item-name{font-size:13px;font-weight:600;color:var(--text);}
.aud-item-role{font-size:10px;color:var(--sub);}
.aud-arrow{margin-left:auto;color:var(--border);font-size:16px;}
.pin-section{display:none;}.pin-section.show{display:block;}
.pin-dots{display:flex;gap:9px;justify-content:center;margin-bottom:13px;}
.pin-dot-el{width:42px;height:42px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--sub);transition:all .1s;}
.pin-dot-el.filled{background:var(--teal-dim);border-color:var(--teal-border);color:var(--teal);}
.pin-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:22px;text-align:center;letter-spacing:8px;background:var(--card2);color:var(--text);outline:none;}
.pin-input:focus{border-color:var(--teal);}
.pin-err{font-size:11px;color:var(--del-red);text-align:center;min-height:17px;margin:5px 0;}
.pin-ok{width:100%;padding:13px;background:var(--teal);color:#07102a;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:5px;}
.pin-back{width:100%;padding:9px;background:transparent;color:var(--sub);border:none;font-size:12px;cursor:pointer;margin-top:3px;}

/* Forms */
.form-grp{margin-bottom:11px;}
.form-lbl{font-size:11px;font-weight:600;color:var(--sub);margin-bottom:4px;display:block;}
.form-inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--card2);color:var(--text);outline:none;font-family:inherit;}
.form-inp:focus{border-color:var(--teal);}
textarea.form-inp{resize:none;line-height:1.5;}
.tog-row{display:flex;gap:5px;}
.tog-btn{flex:1;padding:8px 5px;border:1.5px solid var(--border);border-radius:9px;background:var(--card2);color:var(--sub);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;}
.tog-btn.active.t-pass{background:var(--green-dim);border-color:var(--green-border);color:var(--green);}
.tog-btn.active.t-fail{background:var(--orange-dim);border-color:var(--orange-border);color:var(--amber);}
.tog-btn.active.t-teal{background:var(--teal-dim);border-color:var(--teal-border);color:var(--teal);}
.tog-btn.active.t-org{background:var(--orange-dim);border-color:var(--orange-border);color:var(--amber);}
.tog-btn.active.t-green{background:var(--green-dim);border-color:var(--green-border);color:var(--green);}
.day-grid{display:flex;gap:4px;margin-top:5px;}

async function compressImage(file){
  return new Promise(resolve=>{
    const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),img=new Image(),url=URL.createObjectURL(file);

    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};img.src=url;
  });
}

function arrToB64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function registerFaceID(audId){
  if(!window.PublicKeyCredential){showToast('вқҢ жӯӨиЈқзҪ®дёҚж”ҜжҸҙ Face ID');return;}
  const aud=S.auditors[audId];if(!aud)return;
  try{
    const ch=crypto.getRandomValues(new Uint8Array(32));

      challenge:ch,

      timeout:60000
    }});
    const credId=arrToB64(cred.rawId);

function initSwipe(){
  let sx=0,sy=0,cx=0,drag=false,ghost=null,ghostDir=0;
  const el=document.getElementById('screenHome');

  el.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;cx=0;drag=true;ghost=null;ghostDir=0;
    const b=document.querySelector('.home-body:not(.ghost-panel)');
    if(b)b.style.transition='none';
  },{passive:true});

  el.addEventListener('touchmove',e=>{
    if(!drag)return;
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)&&Math.abs(cx)<8)return;
    cx=dx;
    const ids=Object.keys(S.children),idx=ids.indexOf(S.currentChildId);
    let move=dx;
    if(dx>0&&idx===0)move=dx*0.25;
    if(dx<0&&idx===ids.length-1)move=dx*0.25;
    const W=window.innerWidth;
    // Create ghost panel on first significant move
    const adjIdx=dx<0?idx+1:idx-1;
    if(!ghost&&Math.abs(dx)>8&&adjIdx>=0&&adjIdx<ids.length){
      ghostDir=dx<0?1:-1; // 1=right-side ghost, -1=left-side ghost
      ghost=buildGhostPanel(ids[adjIdx]);
      if(ghost){
        ghost.style.transform=`translateX(${ghostDir>0?W:-W}px)`;
        el.querySelector('.home-body:not(.ghost-panel)').parentNode.appendChild(ghost);
      }
    }
    const b=document.querySelector('.home-body:not(.ghost-panel)');
    if(b)b.style.transform=`translateX(${move}px)`;
    // Ghost slides alongside current panel
    if(ghost)ghost.style.transform=`translateX(${(ghostDir>0?W:-W)+move}px)`;
  },{passive:true});

  el.addEventListener('touchend',()=>{
    if(!drag)return;drag=false;
    const dx=cx;cx=0;
    const b=document.querySelector('.home-body');
    const ids=Object.keys(S.children),idx=ids.indexOf(S.currentChildId);
    const W=window.innerWidth;
    const THRESH=60;

    if(Math.abs(dx)>THRESH){
      if(dx<0&&idx<ids.length-1){
        const W2=window.innerWidth;
        if(b){b.style.transition='transform 0.25s ease-in-out';b.style.transform='translateX(-100%)';}
        if(ghost){ghost.style.transition='transform 0.25s ease-in-out';ghost.style.transform='translateX(0)';}
        setTimeout(()=>{
          if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost);ghost=null;
          selectChild(ids[idx+1]);
        },260);
      } else if(dx>0&&idx>0){
        if(b){b.style.transition='transform 0.25s ease-in-out';b.style.transform='translateX(100%)';}
        if(ghost){ghost.style.transition='transform 0.25s ease-in-out';ghost.style.transform='translateX(0)';}
        setTimeout(()=>{
          if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost);ghost=null;
          selectChild(ids[idx-1]);
        },260);
      } else {
        if(b){b.style.transition='transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';b.style.transform='translateX(0)';}
        if(ghost){const W3=window.innerWidth;ghost.style.transition='transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';ghost.style.transform=`translateX(${ghostDir>0?W3:-W3}px)`;setTimeout(()=>{if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost);ghost=null;},350);}
      }
    } else {
      if(b){b.style.transition='transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';b.style.transform='translateX(0)';}
      if(ghost){const W4=window.innerWidth;ghost.style.transition='transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';ghost.style.transform=`translateX(${ghostDir>0?W4:-W4}px)`;setTimeout(()=>{if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost);ghost=null;},300);}
    }
  },{passive:true});
}

}

  const desc=(document.getElementById('gDesc')?.value||'').trim();if(!desc){showToast('и«Ӣијёе…Ҙзӣ®жЁҷжҸҸиҝ°');return;}
  let freq='once';['once','daily','weekly','monthly'].forEach(f=>{if(document.getElementById(`gFreq_${f}`)?.classList.contains('active'))freq=f;});
  const goal={desc,freq,active:true,rewardNTD:Math.abs(parseFloat(document.getElementById('gRNTD')?.value)||0),rewardMins:Math.abs(parseFloat(document.getElementById('gRMins')?.value)||0),penaltyNTD:Math.abs(parseFloat(document.getElementById('gPNTD')?.value)||0),penaltyMins:Math.abs(parseFloat(document.getElementById('gPMins')?.value)||0),createdBy:S.currentAuditor.name};
  if(freq==='once')goal.dueDate=document.getElementById('gDueDate')?.value||todayISO();
  if(freq==='weekly'){goal.freqDays=[...document.querySelectorAll('.day-btn.active')].map(b=>parseInt(b.dataset.day));if(!goal.freqDays.length){showToast('и«ӢйҒёж“ҮиҮіе°‘дёҖеӨ©');return;}}
  if(freq==='monthly'){goal.freqWeekNum=parseInt(document.getElementById('gWeekNum')?.value||1);goal.freqWeekDay=parseInt(document.getElementById('gWeekDay')?.value||0);}
  try{
    if(S.editingGoalId){goal.updatedAt=Date.now();await db.ref(`/goals/${S.currentChildId}/${catId}/${S.editingGoalId}`).update(goal);}
    else{goal.createdAt=Date.now();await db.ref(`/goals/${S.currentChildId}/${catId}`).push(goal);}
    S.editingGoalId=null;closeModal('modalGoal');showToast('вң… зӣ®жЁҷе·Іе„ІеӯҳпјҒ');
  }catch(e){console.error(e);showToast('вқҢ е„ІеӯҳеӨұж•—');}
}

function verifyGoal(catId,goalId,result){
  if(!S.currentAuditor){S.pendingVerify={catId,goalId,result};showToast('вҡ пёҸ и«Ӣе…Ҳзҷ»е…ҘеҜ©ж ёдәә');openAuditorModal();return;}
  const goal=S.goals[S.currentChildId]?.[catId]?.[goalId];if(!goal)return;
  const ntd=result==='pass'?(goal.rewardNTD||0):-(goal.penaltyNTD||0);
  const mins=result==='pass'?(goal.rewardMins||0):-(goal.penaltyMins||0);
  const hasAmt=ntd!==0||mins!==0;
  document.getElementById('confirmBody').innerHTML=`<div class="confirm-box"><div style="font-size:26px;text-align:center;margin-bottom:7px;">${result==='pass'?'вң…':'вқҢ'}</div><div class="confirm-msg"><strong>${result==='pass'?'Passed':'Failed'}</strong><br><span style="font-size:11px;color:var(--sub);">${goal.desc}</span>${hasAmt?`<div style="display:flex;gap:6px;justify-content:center;margin:8px 0;">${ntd!==0?`<span class="goal-reward-pill ${ntd>0?'reward-pass':'reward-fail'}">${ntd>0?'+':''}${ntd} NTD</span>`:''}${mins!==0?`<span class="goal-reward-pill ${mins>0?'reward-pass':'reward-fail'}">${mins>0?'+':''}${mins} mins</span>`:''}</div>`:`<div style="color:var(--sub);font-size:11px;margin:7px 0;">пјҲжң¬ж¬Ўз„ЎзҚҺжҮІиЁҳйҢ„пјү</div>`}<span style="font-size:10px;color:var(--sub);">еҜ©ж ёдәәпјҡ${S.currentAuditor.name}</span></div><div class="confirm-row"><button class="confirm-cancel" onclick="closeModal('modalConfirm')">еҸ–ж¶Ҳ</button><button class="${result==='pass'?'confirm-pass':'confirm-fail'}" onclick="confirmVerify('${catId}','${goalId}','${result}')">зўәиӘҚ ${result==='pass'?'Passed':'Failed'}</button></div></div>`;
  showModal('modalConfirm');
}
async function confirmVerify(catId,goalId,result){
  closeModal('modalConfirm');
  const goal=S.goals[S.currentChildId]?.[catId]?.[goalId];if(!goal||!S.currentAuditor)return;
  const ntd=result==='pass'?(goal.rewardNTD||0):-(goal.penaltyNTD||0);
  const mins=result==='pass'?(goal.rewardMins||0):-(goal.penaltyMins||0);
  try{
    if(ntd!==0||mins!==0)await db.ref(`/entries/${S.currentChildId}/${catId}`).push({date:fmtDate(todayISO()),ntd,mins,auditor:S.currentAuditor.name,note:`[зӣ®жЁҷ] ${goal.desc}`,passed:result==='pass',goalId,createdAt:Date.now()});
    if(!isRecurring(goal))await db.ref(`/goals/${S.currentChildId}/${catId}/${goalId}`).update({active:false,completedAt:Date.now(),completedResult:result});
    showToast(`${result==='pass'?'вң… Passed':'вқҢ Failed'} е·ІиЁҳйҢ„пјҒ`);
  }catch(e){console.error(e);showToast('вқҢ иЁҳйҢ„еӨұж•—');}
}

function buildEntryForm(cat,existing){
  const ex=existing||{};let h='';
  if(!existing)h+=`<div class="form-grp"><label class="form-lbl">рҹ“… ж—Ҙжңҹ</label><input type="date" class="form-inp" id="fDate" value="${todayISO()}" max="${todayISO()}"></div>`;
  else h+=`<div class="form-grp"><label class="form-lbl">рҹ“… ж—Ҙжңҹ</label><div style="padding:10px 12px;background:var(--card2);border-radius:10px;font-size:12px;color:var(--sub);">${ex.date||'вҖ”'} <span style="font-size:9px;">пјҲдёҚеҸҜжӣҙж”№пјү</span></div></div>`;
  if(cat.type==='transactions'){
    const existDir=existing?txDirection(existing):'withdraw';const existCurr=existing?(Number(ex.ntd||0)!==0?'money':'time'):'money';const existAmt=existing?Math.abs(Number(ex.ntd||0)||Number(ex.mins||0)):0;
    h+=`<div class="form-grp"><label class="form-lbl">ж“ҚдҪңйЎһеһӢ</label><div class="tog-row"><button class="tog-btn ${existDir==='withdraw'?'active ':''}t-org" id="togTxA" onclick="setTxTog('withdraw')">рҹ’ё Withdraw</button><button class="tog-btn ${existDir==='deposit'?'active ':''}t-green" id="togTxB" onclick="setTxTog('deposit')">рҹ’° Deposit</button></div></div>`;
    h+=`<div class="form-grp"><label class="form-lbl">иІЁе№ЈйЎһеһӢ</label><div class="tog-row"><button class="tog-btn ${existCurr==='money'?'active ':''}t-teal" id="togCurA" onclick="setTxCurr('money')">рҹ’° NTD</button><button class="tog-btn ${existCurr==='time'?'active ':''}t-teal" id="togCurB" onclick="setTxCurr('time')">вҸұ Mins</button></div></div>`;
    h+=`<div class="form-grp"><label class="form-lbl">йҮ‘йЎҚпјҲијёе…ҘжӯЈж•ёпјү</label><input type="number" class="amt-inp" id="fAmount" placeholder="0" min="0" step="10" value="${existAmt||''}"><div class="tx-hint-box ${existDir}" id="txHintBox">${existDir==='withdraw'?'рҹ’ё жҸҗй ҳеҫҢеҫһзёҪйЎҚжүЈйҷӨ':'рҹ’° еӯҳе…ҘеҫҢзҙҜиЁҲиҮізёҪйЎҚ'}</div></div>`;
  } else if(cat.type==='goal'){
    const isPass=ex.passed!==false;
    h+=`<div class="form-grp"><label class="form-lbl">зөҗжһң</label><div class="tog-row"><button class="tog-btn ${isPass?'active ':''}t-pass" id="togA" onclick="setTog('pass')">вң… Passed</button><button class="tog-btn ${!isPass?'active ':''}t-fail" id="togB" onclick="setTog('fail')">вқҢ Failed</button></div></div>`;
    h+=`<div class="form-grp"><label class="form-lbl">йҮ‘йЎҚпјҲжӯЈж•ёпјү</label><div class="amt-row"><div class="amt-grp"><span class="amt-lbl">NTD</span><input type="number" class="amt-inp" id="fNTD" placeholder="0" min="0" step="10" value="${existing?Math.abs(Number(ex.ntd||0)):''}"></div><div class="amt-grp"><span class="amt-lbl">Mins</span><input type="number" class="amt-inp" id="fMins" placeholder="0" min="0" step="10" value="${existing?Math.abs(Number(ex.mins||0)):''}"></div></div></div>`;
  } else {
    const isReward=!existing||(Number(ex.ntd||0)>=0&&Number(ex.mins||0)>=0);
    h+=`<div class="form-grp"><label class="form-lbl">йЎһеһӢ</label><div class="tog-row"><button class="tog-btn ${isReward?'active ':''}t-green" id="togA" onclick="setBTog('reward')">рҹ‘Қ еҳүзҚҺ</button><button class="tog-btn ${!isReward?'active ':''}t-org" id="togB" onclick="setBTog('punish')">рҹ‘Һ жҮІзҪ°</button></div></div>`;
    h+=`<div class="form-grp"><label class="form-lbl">йҮ‘йЎҚпјҲжӯЈж•ёпјү</label><div class="amt-row"><div class="amt-grp"><span class="amt-lbl">NTD</span><input type="number" class="amt-inp" id="fNTD" placeholder="0" min="0" step="10" value="${existing?Math.abs(Number(ex.ntd||0)):''}"></div><div class="amt-grp"><span class="amt-lbl">Mins</span><input type="number" class="amt-inp" id="fMins" placeholder="0" min="0" step="10" value="${existing?Math.abs(Number(ex.mins||0)):''}"></div></div></div>`;
  }
  const isVocab=cat.id==='vocab';
  const notePlaceholder=isVocab?'иЁҳйҢ„д»ҠеӨ©иғҢзҡ„е–®еӯ—пјҢдҫӢпјҡapple иҳӢжһң, banana йҰҷи•ү, cat иІ“вҖҰ':'дҫӢпјҡиІ·жЁӮй«ҳгҖҒдё»еӢ•е®ҢжҲҗгҖҒй ӮеҳҙвҖҰ';
  const noteLabel=isVocab?'рҹ“ҡ д»ҠеӨ©иғҢзҡ„е–®еӯ—':'рҹ“қ еӮҷиЁ»пјҲйҒёеЎ«пјү';

  h+=`<div class="form-aud-row">еҜ©ж ёдәәпјҡ${S.currentAuditor.name}</div>`;
  h+=`<button class="save-btn" onclick="saveEntry('${cat.id}')">рҹ’ҫ ${existing?'жӣҙж–°иЁҳйҢ„':'е„ІеӯҳиЁҳйҢ„'}</button>`;

}
function setTog(v){document.getElementById('togA').className=`tog-btn ${v==='pass'?'active ':''}t-pass`;document.getElementById('togB').className=`tog-btn ${v==='fail'?'active ':''}t-fail`;}
function setBTog(v){document.getElementById('togA').className=`tog-btn ${v==='reward'?'active ':''}t-green`;document.getElementById('togB').className=`tog-btn ${v==='punish'?'active ':''}t-org`;}
function setTxTog(v){document.getElementById('togTxA').className=`tog-btn ${v==='withdraw'?'active ':''}t-org`;document.getElementById('togTxB').className=`tog-btn ${v==='deposit'?'active ':''}t-green`;const b=document.getElementById('txHintBox');b.className=`tx-hint-box ${v}`;b.textContent=v==='withdraw'?'рҹ’ё жҸҗй ҳеҫҢеҫһзёҪйЎҚжүЈйҷӨ':'рҹ’° еӯҳе…ҘеҫҢзҙҜиЁҲиҮізёҪйЎҚ';}
function setTxCurr(v){document.getElementById('togCurA').className=`tog-btn ${v==='money'?'active ':''}t-teal`;document.getElementById('togCurB').className=`tog-btn ${v==='time'?'active ':''}t-teal`;}

async function saveEntry(catId){
  if(!S.currentAuditor){showToast('вҡ пёҸ и«Ӣе…Ҳзҷ»е…ҘеҜ©ж ёдәә');return;}
  const cat=CATS.find(c=>c.id===catId);const isEdit=!!S.editingEntryId;
  const dateVal=isEdit?null:document.getElementById('fDate')?.value;if(!isEdit&&!dateVal){showToast('и«ӢйҒёж“Үж—Ҙжңҹ');return;}
  let ntd=0,mins=0;const note=(document.getElementById('fNote')?.value||'').trim();
  if(cat.type==='transactions'){const isW=document.getElementById('togTxA').classList.contains('active');const isM=document.getElementById('togCurA').classList.contains('active');const amt=Math.abs(parseFloat(document.getElementById('fAmount').value)||0);if(!amt){showToast('и«Ӣијёе…ҘйҮ‘йЎҚ');return;}if(isM)ntd=(isW?-1:1)*amt;else mins=(isW?-1:1)*amt;}
  else if(cat.type==='goal'){const isFail=document.getElementById('togB').classList.contains('active');const s=isFail?-1:1;ntd=s*Math.abs(parseFloat(document.getElementById('fNTD').value)||0);mins=s*Math.abs(parseFloat(document.getElementById('fMins').value)||0);if(!ntd&&!mins){showToast('и«ӢиҮіе°‘ијёе…ҘдёҖеҖӢйҮ‘йЎҚ');return;}}
  else{const isP=document.getElementById('togB').classList.contains('active');const s=isP?-1:1;ntd=s*Math.abs(parseFloat(document.getElementById('fNTD').value)||0);mins=s*Math.abs(parseFloat(document.getElementById('fMins').value)||0);if(!ntd&&!mins){showToast('и«ӢиҮіе°‘ијёе…ҘдёҖеҖӢйҮ‘йЎҚ');return;}}
  try{
    if(isEdit){const upd={ntd,mins,auditor:S.currentAuditor.name,note,editedAt:Date.now()};if(cat.type==='goal')upd.passed=document.getElementById('togA').classList.contains('active');await db.ref(`/entries/${S.currentChildId}/${catId}/${S.editingEntryId}`).update(upd);showToast('вң… иЁҳйҢ„е·Іжӣҙж–°пјҒ');}
    else{const entry={date:fmtDate(dateVal),ntd,mins,auditor:S.currentAuditor.name,note,createdAt:Date.now()};if(cat.type==='goal')entry.passed=document.getElementById('togA').classList.contains('active');await db.ref(`/entries/${S.currentChildId}/${catId}`).push(entry);showToast('вң… иЁҳйҢ„е·Іе„ІеӯҳпјҒ');}
    S.editingEntryId=null;closeModal('modalEntry');
  }catch(e){console.error(e);showToast('вқҢ е„ІеӯҳеӨұж•—');}
}

function buildRecordsList(catId){
  const cat=CATS.find(c=>c.id===catId);
  const all=Object.entries((S.entries[S.currentChildId]||{})[catId]||{});
  let active=all.filter(([,e])=>!e.deletedAt).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  const deleted=all.filter(([,e])=>!!e.deletedAt).sort((a,b)=>(b[1].deletedAt||0)-(a[1].deletedAt||0));
  const canAct=!!S.currentAuditor;
  if(cat.type==='transactions'&&S.txFilter!=='all')active=active.filter(([,e])=>txDirection(e)===S.txFilter);
  let html='';
  if(!active.length)html+=`<div class="empty-state">рҹ“ӯ е°ҡз„ЎиЁҳйҢ„</div>`;
  else html+=active.map(([id,e])=>{
    const ns=amtStr(Number(e.ntd||0),'NTD'),ms=amtStr(Number(e.mins||0),'mins');
    const nc=amtCls(Number(e.ntd||0)),mc=amtCls(Number(e.mins||0));
    // No auditor, no badge вҖ” just date + amounts + notes
    const editedTag=e.editedAt?`<span class="rec-edited-inline">е·Із·ЁијҜ</span>`:'';
    const acts=canAct
      ?`<div class="rec-actions">${editedTag}<button class="rec-act" onclick="openAddEntry('${id}')">вңҸпёҸ</button><button class="rec-act del" onclick="confirmDelete('${catId}','${id}')">рҹ—‘пёҸ</button></div>`
      :(editedTag?`<div class="rec-actions">${editedTag}</div>`:'');
    return `<div class="rec-card"><div class="rec-top"><span class="rec-date">${e.date||'вҖ”'}</span><div class="rec-amts-inline">${ns?`<span class="rec-amt ${nc}">${ns}</span>`:''}${ms?`<span class="rec-amt ${mc}">${ms}</span>`:''}</div>${acts}</div>${e.note?`<div class="rec-note">${e.note}</div>`:''}</div>`;
  }).join('');
  if(deleted.length){
    html+=`<div class="sec-lbl" style="margin-top:14px;margin-bottom:6px;color:var(--del-red);">рҹ—‘пёҸ жңҖиҝ‘еҲӘйҷӨпјҲ7еӨ©е…§еҸҜжҒўеҫ©пјү</div>`;
    html+=deleted.map(([id,e])=>{
      const daysLeft=Math.max(1,Math.ceil((e.deletedAt+7*24*60*60*1000-Date.now())/(24*60*60*1000)));
      const ns=amtStr(Number(e.ntd||0),'NTD'),ms=amtStr(Number(e.mins||0),'mins');
      return `<div class="rec-card deleted-card"><div class="rec-top"><span class="rec-date">${e.date||'вҖ”'}</span><span class="rec-aud">В· ${e.auditor||'вҖ”'}</span><span class="days-left">${daysLeft}еӨ©еҫҢж°ёд№…еҲӘйҷӨ</span></div><div style="display:flex;align-items:center;gap:7px;margin-top:3px;"><div style="flex:1;">${ns?`<span class="rec-amt" style="font-size:11px;color:var(--sub);">${ns}</span> `:''} ${ms?`<span class="rec-amt" style="font-size:11px;color:var(--sub);">${ms}</span>`:''} ${e.note?`<div class="rec-note">${e.note}</div>`:''}</div>${canAct?`<button class="restore-btn" onclick="restoreEntry('${catId}','${id}')">жҒўеҫ©</button>`:''}</div></div>`;
    }).join('');
  }
  return html;
}
function confirmDelete(catId,entryId){document.getElementById('confirmBody').innerHTML=`<div class="confirm-box"><div class="confirm-msg">зўәе®ҡиҰҒеҲӘйҷӨйҖҷзӯҶиЁҳйҢ„е—Һпјҹ<br><span style="font-size:11px;color:var(--sub);">дҝқз•ҷ 7 еӨ©пјҢеҸҜеңЁгҖҢжңҖиҝ‘еҲӘйҷӨгҖҚжҒўеҫ©</span></div><div class="confirm-row"><button class="confirm-cancel" onclick="closeModal('modalConfirm')">еҸ–ж¶Ҳ</button><button class="confirm-del" onclick="deleteEntry('${catId}','${entryId}')">еҲӘйҷӨ</button></div></div>`;showModal('modalConfirm');}

async function restoreEntry(catId,entryId){if(!S.currentAuditor){showToast('вҡ пёҸ и«Ӣе…Ҳзҷ»е…ҘеҜ©ж ёдәә');return;}try{await db.ref(`/entries/${S.currentChildId}/${catId}/${entryId}/deletedAt`).remove();showToast('вң… е·ІжҒўеҫ©');}catch(e){showToast('вқҢ жҒўеҫ©еӨұж•—');}}

  html+=`<div class="person-row"><div class="person-av">${a.photoB64?`<img src="${a.photoB64}">`:(a.emoji||'рҹ‘Ө')}</div><div class="person-info"><div class="person-name">${a.name}</div><div class="person-sub">${a.credId?'Face ID е·Іе•ҹз”Ё':'PIN зҷ»е…Ҙ'}</div></div><div class="person-acts">${fidBtn}<button class="person-act" onclick="openPersonModal('auditor','${id}')">вңҸпёҸ</button><button class="person-act del" onclick="confirmDeletePerson('auditor','${id}','${a.name}')">рҹ—‘пёҸ</button></div></div>`;});
  html+=`</div>`;
  html+=`<div class="settings-info"><div class="settings-info-title">рҹҸ… KidsAPP</div><div class="settings-info-sub">Firebase Realtime DB</div><button class="cache-clear-btn" onclick="clearCache()">рҹ”„ жё…йҷӨеҝ«еҸ–дёҰйҮҚж–°ијүе…Ҙ</button><div style="font-size:10px;color:var(--sub);margin-top:6px;">App йЎҜзӨәиҲҠзүҲз•«йқўжҷӮи«Ӣй»һжӯӨеј·еҲ¶жӣҙж–°</div></div>`;
  document.getElementById('settingsContent').innerHTML=html;
}
function openPersonModal(type,id){S.editingPersonType=type;S.editingPersonId=id;S.pendingPhoto=null;const existing=id?(type==='child'?S.children[id]:S.auditors[id]):null;document.getElementById('personTitle').textContent=id?(type==='child'?'вңҸпёҸ з·ЁијҜеӯ©еӯҗ':'вңҸпёҸ з·ЁијҜеҜ©ж ёдәә'):(type==='child'?'вһ• ж–°еўһеӯ©еӯҗ':'вһ• ж–°еўһеҜ©ж ёдәә');document.getElementById('personForm').innerHTML=buildPersonForm(type,existing);showModal('modalPerson');}
function buildPersonForm(type,ex){
  ex=ex||{};let h='';
  const initImg=ex.photoB64?`<img src="${ex.photoB64}" style="width:100%;height:100%;object-fit:cover;display:block;">`:`<span style="font-size:34px;">${ex.emoji||(type==='child'?'рҹ‘§':'рҹ‘Ө')}</span>`;
  h+=`<div class="photo-picker-area"><div class="photo-preview-box" id="photoPreviewBox" onclick="pickPhoto()">${initImg}</div><button class="photo-pick-btn" onclick="pickPhoto()">рҹ“· й»һж“ҠжӣҙжҸӣз…§зүҮ</button></div>`;
  h+=`<div class="form-grp"><label class="form-lbl">е§“еҗҚ</label><input type="text" class="form-inp" id="pName" value="${ex.name||''}" placeholder="${type==='child'?'дҫӢпјҡе°ҸжҳҺ':'дҫӢпјҡHang'}"></div>`;
  h+=`<div class="form-grp"><label class="form-lbl">EmojiпјҲз„Ўз…§зүҮжҷӮйЎҜзӨәпјү</label><input type="text" class="form-inp" id="pEmoji" value="${ex.emoji||''}" placeholder="${type==='child'?'рҹ‘Ұ':'рҹ‘©'}" style="font-size:20px;text-align:center;"></div>`;
  if(type==='auditor'){
    h+=`<div class="form-grp"><label class="form-lbl">иҒ·зЁұ</label><input type="text" class="form-inp" id="pRole" value="${ex.role||''}" placeholder="дҫӢпјҡе®¶й•·"></div>`;
    if(!S.editingPersonId)h+=`<div class="form-grp"><label class="form-lbl">рҹ”‘ иЁӯе®ҡ PINпјҲ4зўјж•ёеӯ—пјү</label><input type="password" inputmode="numeric" maxlength="4" class="pin-change-input" id="pNewPin" placeholder="вҖўвҖўвҖўвҖў"><input type="password" inputmode="numeric" maxlength="4" class="pin-change-input" id="pNewPin2" placeholder="зўәиӘҚ PIN"></div>`;
    else h+=`<div class="form-grp"><button class="pin-toggle-btn" onclick="togglePinSection()">рҹ”‘ дҝ®ж”№ PIN вҖә</button><div id="pinChangeSection" style="display:none;" class="pin-change-section"><div class="form-lbl" style="margin-bottom:5px;">ијёе…ҘиҲҠ PIN й©—иӯү</div><input type="password" inputmode="numeric" maxlength="4" class="pin-change-input" id="pOldPin" placeholder="иҲҠ PIN вҖўвҖўвҖўвҖў"><div class="form-lbl" style="margin-bottom:5px;">ж–° PIN</div><input type="password" inputmode="numeric" maxlength="4" class="pin-change-input" id="pNewPin" placeholder="ж–° PIN вҖўвҖўвҖўвҖў"><input type="password" inputmode="numeric" maxlength="4" class="pin-change-input" id="pNewPin2" placeholder="зўәиӘҚж–° PIN вҖўвҖўвҖўвҖў"></div></div>`;
  }
  h+=`<button class="save-btn" onclick="savePerson()">рҹ’ҫ е„Іеӯҳ</button>`;return h;
}
function togglePinSection(){const s=document.getElementById('pinChangeSection');s.style.display=s.style.display==='none'?'block':'none';}
async function savePerson(){
  const type=S.editingPersonType,id=S.editingPersonId;
  const name=(document.getElementById('pName')?.value||'').trim();if(!name){showToast('и«Ӣијёе…Ҙе§“еҗҚ');return;}
  const emoji=(document.getElementById('pEmoji')?.value||'').trim();
  const data={name,emoji:emoji||(type==='child'?'рҹ‘§':'рҹ‘Ө')};
  if(S.pendingPhoto)data.photoB64=S.pendingPhoto;
  else if(id){const existing=type==='child'?S.children[id]:S.auditors[id];if(existing?.photoB64)data.photoB64=existing.photoB64;}
  if(type==='auditor'){
    data.role=(document.getElementById('pRole')?.value||'').trim()||'е®¶й•·';
    const newPin=document.getElementById('pNewPin')?.value||'',newPin2=document.getElementById('pNewPin2')?.value||'';
    if(!id){if(newPin.length!==4){showToast('и«ӢиЁӯе®ҡ 4 зўј PIN');return;}if(newPin!==newPin2){showToast('е…©ж¬Ў PIN дёҚдёҖиҮҙ');return;}data.pin=newPin;}
    else{data.pin=S.auditors[id]?.pin||'0000';if(newPin){const oldPin=document.getElementById('pOldPin')?.value||'';if(oldPin!==S.auditors[id]?.pin){showToast('вқҢ иҲҠ PIN йҢҜиӘӨ');return;}if(newPin.length!==4){showToast('ж–° PIN еҝ…й ҲзӮә 4 зўј');return;}if(newPin!==newPin2){showToast('е…©ж¬Ўж–° PIN дёҚдёҖиҮҙ');return;}data.pin=newPin;}}
  }
  try{
    const path=type==='child'?'/children':'/auditors';
    if(id)await db.ref(`${path}/${id}`).update(data);else{const r=db.ref(path).push();await r.set(data);}
    const snap=await db.ref(path).once('value');
    if(type==='child')S.children=snap.val()||{};else S.auditors=snap.val()||{};
    S.pendingPhoto=null;closeModal('modalPerson');renderSettings();renderAll();showToast('вң… е„ІеӯҳжҲҗеҠҹпјҒ');
  }catch(e){console.error(e);showToast('вқҢ е„ІеӯҳеӨұж•—');}
}
function confirmDeletePerson(type,id,name){
  const tl=type==='child'?'еӯ©еӯҗ':'еҜ©ж ёдәә';const warn=type==='child'?'<br><span style="font-size:11px;color:var(--del-red);">вҡ пёҸ еҗҢжҷӮеҲӘйҷӨжүҖжңүиЁҳйҢ„иҲҮзӣ®жЁҷ</span>':'';
  document.getElementById('confirmBody').innerHTML=`<div class="confirm-box"><div class="confirm-msg">зўәе®ҡеҲӘйҷӨ${tl}гҖҢ${name}гҖҚпјҹ${warn}</div><div class="confirm-row"><button class="confirm-cancel" onclick="closeModal('modalConfirm')">еҸ–ж¶Ҳ</button><button class="confirm-del" onclick="deletePerson('${type}','${id}')">еҲӘйҷӨ</button></div></div>`;showModal('modalConfirm');
}
async function deletePerson(type,id){
  closeModal('modalConfirm');
  try{
    if(type==='child'){await Promise.all([db.ref(`/children/${id}`).remove(),db.ref(`/entries/${id}`).remove(),db.ref(`/goals/${id}`).remove()]);const snap=await db.ref('/children').once('value');S.children=snap.val()||{};S.entries[id]={};S.goals[id]={};S.currentChildId=Object.keys(S.children)[0]||null;if(S.currentChildId){const[es,gs]=await Promise.all([db.ref(`/entries/${S.currentChildId}`).once('value'),db.ref(`/goals/${S.currentChildId}`).once('value')]);S.entries[S.currentChildId]=es.val()||{};S.goals[S.currentChildId]=gs.val()||{};attachMainListener(S.currentChildId);attachGoalListener(S.currentChildId);}}
    else{await db.ref(`/auditors/${id}`).remove();const snap=await db.ref('/auditors').once('value');S.auditors=snap.val()||{};if(S.currentAuditor?.id===id)S.currentAuditor=null;}
    renderSettings();renderAll();showToast('вң… е·ІеҲӘйҷӨ');
  }catch(e){console.error(e);showToast('вқҢ еҲӘйҷӨеӨұж•—');}
}
function selectChild(id){
  if(id===S.currentChildId)return;S.currentChildId=id;
  Promise.all([db.ref(`/entries/${id}`).once('value'),db.ref(`/goals/${id}`).once('value')]).then(([es,gs])=>{S.entries[id]=es.val()||{};S.goals[id]=gs.val()||{};attachMainListener(id);attachGoalListener(id);renderAll();});
}

function openAuditorModal(){
  document.getElementById('audList').innerHTML=Object.entries(S.auditors).map(([id,a])=>`<div class="aud-item" onclick="selectAuditor('${id}')"><div class="aud-av">${a.photoB64?`<img src="${a.photoB64}">`:(a.emoji||'рҹ‘Ө')}</div><div><div class="aud-item-name">${a.name}</div><div class="aud-item-role">${a.role||''}</div></div><div class="aud-arrow">вҖә</div></div>`).join('');
  document.getElementById('step1').style.display='block';document.getElementById('step2').classList.remove('show');showModal('modalAud');
}
function selectAuditor(id){
  const a=S.auditors[id];
  if(a.credId){
    showToast('рҹ”җ Face ID й©—иӯүдёӯвҖҰ',4000);
    tryFaceID(id).then(ok=>{
      if(ok){
        S.currentAuditor={id,...a};closeModal('modalAud');renderAudChip();
        showToast('вң… жӯЎиҝҺпјҢ'+a.name+'пјҒ');
        if(S.currentCat)renderDetailContent(S.currentCat);
        if(S.pendingVerify){const pv=S.pendingVerify;S.pendingVerify=null;setTimeout(()=>verifyGoal(pv.catId,pv.goalId,pv.result),400);}
      } else {
        showToast('Face ID еӨұж•—пјҢи«Ӣијёе…Ҙ PIN',2000);
        showPinStep(id,a);
      }
    });
  } else {
    showPinStep(id,a);
  }
}
function showPinStep(id,a){
  S.pendingAuditor={id,...a};
  document.getElementById('pinTitle').textContent=`${a.emoji||'рҹ‘Ө'} ${a.name}`;
  document.getElementById('pinInput').value='';document.getElementById('pinErr').textContent='';updateDots(0);
  document.getElementById('step1').style.display='none';document.getElementById('step2').classList.add('show');
  setTimeout(()=>document.getElementById('pinInput').focus(),120);
}
function handlePinInput(){const v=document.getElementById('pinInput').value;document.getElementById('pinErr').textContent='';updateDots(v.length);if(v.length===4)setTimeout(confirmPin,160);}
function updateDots(n){document.querySelectorAll('#pinDots .pin-dot-el').forEach((d,i)=>{d.textContent=i<n?'в—Ҹ':'вҖў';d.classList.toggle('filled',i<n);});}
function confirmPin(){
  const pin=document.getElementById('pinInput').value;
  if(pin!==S.pendingAuditor.pin){document.getElementById('pinErr').textContent='вқҢ PIN йҢҜиӘӨпјҢи«ӢеҶҚи©ҰдёҖж¬Ў';document.getElementById('pinInput').value='';updateDots(0);return;}
  S.currentAuditor={...S.pendingAuditor};S.pendingAuditor=null;
  closeModal('modalAud');renderAudChip();showToast(`вң… жӯЎиҝҺпјҢ${S.currentAuditor.name}пјҒ`);
  if(S.currentCat)renderDetailContent(S.currentCat);
  if(S.pendingVerify){const pv=S.pendingVerify;S.pendingVerify=null;setTimeout(()=>verifyGoal(pv.catId,pv.goalId,pv.result),400);}
}
function backToStep1(){document.getElementById('step2').classList.remove('show');document.getElementById('step1').style.display='block';S.pendingAuditor=null;}
function handleOverlay(e,id){if(e.target.classList.contains('modal-overlay'))closeModal(id);}

async function clearCache(){
  try{
    if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.unregister();}
    if('caches' in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}
    showToast('вң… еҝ«еҸ–е·Іжё…йҷӨпјҢйҮҚж–°ијүе…ҘдёӯвҖҰ',1500);setTimeout(()=>location.reload(true),1600);
  }catch(e){showToast('вқҢ жё…йҷӨеӨұж•—');}
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showModal(id){const el=document.getElementById(id);el.style.display='flex';requestAnimationFrame(()=>el.classList.add('show'));}
function closeModal(id){const el=document.getElementById(id);el.classList.remove('show');setTimeout(()=>{el.style.display='none';},300);}

let _tt;
function showToast(msg,ms=2600){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),ms);}

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(r=>console.log('KidsAPP SW:',r.scope)).catch(e=>console.error(e));});}

init();
</script>
</body>
